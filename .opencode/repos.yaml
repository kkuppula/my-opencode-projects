repos:
  backend:
    name: Learn
    path: /path/to/your/backend   # e.g., /Users/you/work/learn
    stack: Java/Gradle
    description: Learn LMS backend monolith
    patterns:
      - "API", "service", "controller", "repository", "entity", "DTO"
      - "database", "migration", "endpoint", "REST"

  frontend:
    name: Ultra
    path: /path/to/your/frontend   # e.g., /Users/you/work/ultra
    stack: TypeScript/Angular/Nx
    description: Learn Ultra frontend monorepo
    patterns:
      - "UI", "component", "page", "view", "styling", "CSS"
      - "Angular", "template", "module", "routing", "state"
