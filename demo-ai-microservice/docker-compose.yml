# AI Services Microservice - Docker Compose Configuration
#
# Architecture Decision: Local development stack with all dependencies
# Use: docker-compose up -d
#
# For demo purposes, includes:
# - PostgreSQL database
# - AI Services application
# - Mock ai-integrations service (for testing without real AI backend)

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-services-db
    environment:
      POSTGRES_DB: ai_services
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_services"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  # ==========================================================================
  # AI Services Application
  # ==========================================================================
  ai-services:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-services-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Spring profiles
      SPRING_PROFILES_ACTIVE: dev
      
      # Database connection
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_services
      SPRING_DATASOURCE_USERNAME: ai_user
      SPRING_DATASOURCE_PASSWORD: ai_password
      
      # AI Integrations service URL (use mock for demo)
      AI_INTEGRATIONS_BASE_URL: http://mock-ai-integrations:8081
      
      # JWT configuration (for demo, using a simple JWKS)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://auth.blackboard.com
      
      # AWS config (local mode for demo)
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: localstack
      AWS_SECRET_ACCESS_KEY: localstack
    ports:
      - "8080:8080"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # Mock AI Integrations Service (for demo/testing)
  # ==========================================================================
  mock-ai-integrations:
    image: mockserver/mockserver:5.15.0
    container_name: mock-ai-integrations
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations.json
      MOCKSERVER_LOG_LEVEL: INFO
    ports:
      - "8081:1080"
    volumes:
      - ./mock/expectations.json:/config/expectations.json:ro
    networks:
      - ai-network

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local

# ==========================================================================
# Networks
# ==========================================================================
networks:
  ai-network:
    driver: bridge
