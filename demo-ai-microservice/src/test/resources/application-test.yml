# Test configuration
spring:
  profiles:
    active: test
    
  # Use H2 in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    
  # Disable Flyway for tests (use Hibernate DDL)
  flyway:
    enabled: false
    
  # Security - use mock JWT decoder
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test-auth.blackboard.com

# Disable external services
ai:
  integrations:
    base-url: http://localhost:9999  # Unused in unit tests

aws:
  secrets:
    use-local-secrets: true
    local-secrets:
      test-secret: "test-value"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health

# Logging
logging:
  level:
    root: WARN
    com.blackboard.ai: DEBUG
    org.springframework.security: DEBUG
