# =============================================================================
# AI Services Microservice - Application Configuration
# =============================================================================
# This is the base configuration. Profile-specific configs override these values.

spring:
  application:
    name: ai-services

  # Jackson JSON configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # Database configuration (overridden per profile)
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_services
    username: ai_user
    password: ai_password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate  # Schema managed by Flyway
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  # Flyway database migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # Security - OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          # Production: Use actual JWKS endpoint
          # jwk-set-uri: https://auth.blackboard.com/.well-known/jwks.json
          issuer-uri: https://auth.blackboard.com

# =============================================================================
# AI Integrations Client Configuration
# =============================================================================
ai:
  integrations:
    base-url: http://localhost:8081
    connect-timeout-ms: 5000
    read-timeout-ms: 60000
    write-timeout-ms: 30000
    max-connections: 100
    max-pending-acquires: 1000
    logging-enabled: false

# =============================================================================
# AWS Configuration
# =============================================================================
aws:
  secrets:
    region: us-east-1
    secret-prefix: ai-services/prod/
    use-local-secrets: false

# =============================================================================
# Actuator Configuration
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  info:
    env:
      enabled: true

# Application info for actuator/info endpoint
info:
  app:
    name: AI Services Microservice
    description: AI-powered content generation for Blackboard Learn
    version: 1.0.0
  build:
    artifact: ai-services
    group: com.blackboard

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  shutdown: graceful

# Graceful shutdown timeout
spring.lifecycle.timeout-per-shutdown-phase: 30s

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level:
    root: INFO
    com.blackboard.ai: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# =============================================================================
# Springdoc OpenAPI Configuration
# =============================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: false
