# =============================================================================
# AI Services - Development Profile Configuration
# =============================================================================
# Use: ./gradlew bootRun --args='--spring.profiles.active=dev'
# Or set SPRING_PROFILES_ACTIVE=dev environment variable

spring:
  # Development database - H2 in-memory for quick testing
  # Or use Docker PostgreSQL: docker-compose up postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_services
    username: ai_user
    password: ai_password

  # More lenient JPA settings for development
  jpa:
    hibernate:
      ddl-auto: update  # Auto-create tables in dev (Flyway still runs first)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Flyway - still run migrations but less strict
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false  # Less strict in dev

  # Security - disable JWT validation for easier testing
  # WARNING: Only for local development!
  security:
    oauth2:
      resourceserver:
        jwt:
          # For dev, we use a permissive decoder (see SecurityConfig.java)
          issuer-uri: https://dev-auth.blackboard.com

# =============================================================================
# AI Integrations - Mock Service
# =============================================================================
ai:
  integrations:
    base-url: http://localhost:8081  # MockServer from docker-compose
    logging-enabled: true  # Log all requests/responses in dev

# =============================================================================
# AWS - Local/Mock Settings
# =============================================================================
aws:
  secrets:
    region: us-east-1
    secret-prefix: ai-services/dev/
    use-local-secrets: true  # Use local secrets map instead of AWS
    local-secrets:
      unsplash-api-key: "dev-unsplash-key-not-real"
      openai-api-key: "dev-openai-key-not-real"

# =============================================================================
# Actuator - Full access in development
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: "*"  # Expose all actuator endpoints
  endpoint:
    health:
      show-details: always

# =============================================================================
# Logging - Verbose for development
# =============================================================================
logging:
  level:
    root: INFO
    com.blackboard.ai: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.reactive.function.client: DEBUG

# =============================================================================
# Swagger - Always enabled in dev
# =============================================================================
springdoc:
  swagger-ui:
    enabled: true
    try-it-out-enabled: true
    display-request-duration: true
